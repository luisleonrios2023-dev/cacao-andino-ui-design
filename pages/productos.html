<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cacao Andino - Productos</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/productos.css">
    <link rel="stylesheet" href="../css/cardbyLilaRest.css">
</head>

<body>
    <div id="header-container" data-partial="header"></div>
    <main>
        <section>
            <h2>Productos</h2>
        </section>
        <hr>
        <section id="contenedor-categoria-productos">
            <div class="card" data-categoria="bolleria">
                <div class="card-overlay"></div>
                <div class="card-inner" style="background-image: url('../img/bolleria.png');"><span>BOLLERIA</span>
                </div>
            </div>

            <div class="card" data-categoria="postres-ecuatorianos">
                <div class="card-overlay"></div>
                <div class="card-inner" style="background-image: url('../img/quimbolito.webp');"><span>POSTRES
                        ECUATORIANOS</span></div>
            </div>
            <div class="card" data-categoria="postres-españoles">
                <div class="card-overlay"></div>
                <div class="card-inner" style="background-image: url('../img/tarta-queso.jpg');"><span>POSTRES
                        ESPAÑOLES</span></div>
            </div>
            <div class="card" data-categoria="pasteles">
                <div class="card-overlay"></div>
                <div class="card-inner" style="background-image: url('../img/pastel-vainilla-frutos-rojos.webp');">
                    <span>PASTELES</span></div>
            </div>
        </section>
        <section id="contenedor-articulo-producto" class="hidden">
            <button id="volver-categorias">← Volver a categorías</button>

            <div class="producto bolleria">Croissant</div>
            <div class="producto bolleria">Donut</div>

            <div class="producto postres-ecuatorianos">Quimbolito</div>

            <div class="producto postres-espanoles">Tarta de queso</div>

            <div class="producto pasteles">Pastel de vainilla</div>
        </section>
    </main>
    <div id="footer-container" data-partial="footer"></div>
    <script src="../js/main.js" defer></script><!-- defer: para que el js se carge despues del HTML -->
</body>

</html>
